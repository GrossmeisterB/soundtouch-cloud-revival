# Master station list for soundtouch-cloud-revival.
#
# Every URL is HTTP (not HTTPS) — Bose SoundTouch UPnP renderers do not
# support TLS. 30x redirects from an HTTPS frontend onto an HTTP CDN
# node also work; what fails is the initial TLS handshake.
#
# Verified: 2026-05-16. Streams move and break; please open a PR or
# issue if you find a dead URL.

